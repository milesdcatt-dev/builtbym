<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lost page — BuiltByM</title>
<meta name="description" content="That page doesn't exist. Head home." />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%231A6CFF'/><stop offset='1' stop-color='%236B9FFF'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%230A2540'/><text x='50' y='72' font-family='Georgia, serif' font-size='68' font-style='italic' font-weight='500' fill='url(%23g)' text-anchor='middle'>M</text></svg>" />
<meta name="theme-color" content="#1A6CFF" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Manrope:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#1A6CFF; --navy:#0A2540; --paper:#f4f0e6;
    --grad:linear-gradient(135deg, #1A6CFF 0%, #4a9eff 100%);
    --muted:#5a6878; --line:rgba(10,37,64,0.08);
  }
  html, body{height:100%}
  body{
    font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);color:var(--navy);
    display:flex;align-items:center;justify-content:center;
    padding:40px 20px;line-height:1.5;-webkit-font-smoothing:antialiased;
    position:relative;overflow:hidden;
  }
  body::before{
    content:"";position:absolute;inset:-10%;pointer-events:none;
    background:
      radial-gradient(ellipse 40% 30% at 20% 30%, rgba(26,108,255,0.16), transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(107,159,255,0.14), transparent 70%);
    animation:meshDrift 22s ease-in-out infinite alternate;filter:blur(2px);
  }
  body::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(circle, rgba(10,37,64,0.08) 1px, transparent 1.5px);
    background-size:32px 32px;
    -webkit-mask-image:radial-gradient(ellipse 70% 50% at 50% 50%, black 30%, transparent 80%);
            mask-image:radial-gradient(ellipse 70% 50% at 50% 50%, black 30%, transparent 80%);
    opacity:0.6;
  }
  @keyframes meshDrift{
    0%{transform:translate(0,0) scale(1)}
    33%{transform:translate(2%,-1.5%) scale(1.04)}
    66%{transform:translate(-2%,2%) scale(0.98)}
    100%{transform:translate(1.5%,-0.5%) scale(1.02)}
  }
  .wrap{position:relative;z-index:2;max-width:560px;text-align:center}
  .eyebrow{
    display:inline-block;font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--blue);font-weight:500;margin-bottom:24px;
    padding:6px 14px;border-radius:999px;background:rgba(26,108,255,0.08);
  }
  h1{
    font-family:'Fraunces',serif;font-weight:400;
    font-size:clamp(3.5rem,11vw,5.5rem);line-height:0.95;letter-spacing:-0.03em;
    margin-bottom:24px;font-variation-settings:"opsz" 144, "SOFT" 50;
  }
  h1 em{
    font-style:italic;font-variation-settings:"opsz" 144, "SOFT" 100;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }
  p{
    font-family:'Fraunces',serif;font-size:1.2rem;color:#3b4757;
    margin-bottom:36px;font-variation-settings:"opsz" 144;
    max-width:42ch;margin-left:auto;margin-right:auto;
  }
  p em{font-style:italic;color:var(--blue)}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    padding:14px 26px;border-radius:999px;font-family:'Manrope',sans-serif;
    font-size:0.98rem;font-weight:500;letter-spacing:-0.005em;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    text-decoration:none;
  }
  .btn-primary{
    background:var(--grad);color:white;
    box-shadow:0 14px 30px -10px rgba(26,108,255,0.5);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 38px -12px rgba(26,108,255,0.7)}
  .btn-ghost{color:var(--navy);border:1px solid var(--line);background:rgba(255,255,255,0.5)}
  .btn-ghost:hover{border-color:var(--blue)}
  .arrow{transition:transform .3s ease}
  .btn:hover .arrow{transform:translateX(4px)}
  .foot{
    margin-top:48px;font-family:'IBM Plex Mono',monospace;
    font-size:0.74rem;color:var(--muted);letter-spacing:0.04em;
  }
  .foot a{color:var(--navy);text-decoration:none;border-bottom:1px solid var(--line)}
  .foot a:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>
  <div class="wrap">
    <span class="eyebrow">Error · 404</span>
    <h1>Lost <em>page.</em></h1>
    <p>That URL didn't survive the trip. Probably our fault — we built this site by hand and sometimes hands slip.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Back home <span class="arrow">→</span></a>
      <a href="/#contact" class="btn btn-ghost">Tell us what broke</a>
    </div>
    <div class="foot">
      Or just text us: <a href="sms:+12029997885">(202) 999-7885</a>
    </div>
  </div>
</body>
</html>
